server {
    listen 8080;
    server_name localhost;

    error_page 403 /403.html;
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
        add_header Content-Type text/html;
        return 200 "<html><head><title>403 Forbidden</title></head><body style='background:#121212;color:#eee;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;'><div><h1>403 Forbidden</h1><p>Access restricted to DEC Corporate Network.</p></div></body></html>";
    }

    location /zoho-accounts/ {
        proxy_pass https://accounts.zoho.com/;
        proxy_set_header Host accounts.zoho.com;
        proxy_ssl_server_name on;
    }

    location /zoho-mail/ {
        proxy_pass https://mail.zoho.com/;
        proxy_set_header Host mail.zoho.com;
        proxy_ssl_server_name on;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

